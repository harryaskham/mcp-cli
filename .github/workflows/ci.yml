name: CI

# Manual-dispatch only for now: this lands the azure-ephemeral runner config
# without queuing any job before the self-hosted runner pool is live. Add the
# push / pull_request triggers below once the runners are up (bd-f023df).
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  check:
    # x86/Linux validation on the azure-ephemeral self-hosted runner pool.
    # The runners ship Nix + flakes but no bare toolchain on PATH, so every
    # command runs inside the flake's default devshell (nix develop), which
    # provides cargo/rustc/clippy/rustfmt — no toolchain action or custom
    # runner image required.
    runs-on: [self-hosted, azure-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: nix develop --command cargo fmt --all -- --check
      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: nix develop --command cargo test --workspace --all-features
