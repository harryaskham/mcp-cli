name: CI

# GitHub-hosted CI gate for the auto-merge cutover (bd-bcb4b8).
#
# mcp-cli is a public personal-account repo, so ubuntu-latest hosted runners are
# free and need no self-hosted pool. GitHub merge queue requires an org, so it is
# unavailable here for now; instead we gate auto-merge on this required check.
#
# Triggers:
#   - pull_request: the required green check that auto-merge waits on.
#   - push to main: validates the trunk and registers the check context so it can
#     be required in branch protection.
#   - merge_group: ready for GitHub merge queue if mcp-cli ever moves under an org
#     (the queue builds gh-readonly-queue/* refs; without this it would wedge PRs).
#   - workflow_dispatch: manual runs.
#
# Validation stays rust-not-nix (plain cargo via dtolnay/rust-toolchain); flake.nix
# remains a contributor dev-shell convenience and is not used by CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
